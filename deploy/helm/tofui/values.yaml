# -- Replica counts for each component
replicaCount:
  server: 1
  worker: 1   # Only 1 worker recommended — River handles concurrency internally
  web: 1

# -- Container images
image:
  server:
    repository: tofui/server
    tag: latest
    pullPolicy: IfNotPresent
  worker:
    repository: tofui/worker
    tag: latest
    pullPolicy: IfNotPresent
  web:
    repository: tofui/web
    tag: latest
    pullPolicy: IfNotPresent
  migrate:
    repository: tofui/migrate
    tag: latest
    pullPolicy: IfNotPresent

# -- Application configuration
# Secrets (jwtSecret, encryptionKey, githubClientSecret, webhookSecret, S3 creds)
# are stored in a Kubernetes Secret. Everything else goes in a ConfigMap.
config:
  # Server
  serverAddr: ":8080"
  serverBaseURL: "http://localhost:8080"      # Public URL — set to your domain in production
  webURL: "http://localhost:5173"             # Frontend URL — set to your domain in production
  environment: "development"                  # "development" | "staging" | "production"
  logLevel: "info"                            # "debug" | "info" | "warn" | "error"
  shutdownTimeout: "15s"

  # Auth — create a GitHub OAuth App and set these
  githubClientID: ""
  githubClientSecret: ""

  # Security — MUST change these in production
  jwtSecret: "dev-secret-change-in-production"
  jwtExpiration: "24h"
  encryptionKey: "dev-encryption-key-32bytes!!!!!!"  # Must be exactly 32 bytes
  webhookSecret: ""                                   # HMAC secret for GitHub webhooks

  # Executor — "local" runs tofu on the worker host, "kubernetes" uses ephemeral pods
  executorType: "local"
  executorNamespace: "tofui"                  # K8s namespace for executor pods
  executorImage: "tofui-executor:tofu-1.11"   # Default executor image

  # Worker
  workerConcurrency: "10"
  workerHealthAddr: ":8081"

  # S3 — region only, creds come from the minio subchart values below
  s3Region: "us-east-1"

  # Database tuning
  dbMaxConns: "25"
  dbMinConns: "5"

# -- PostgreSQL subchart (Bitnami)
postgresql:
  enabled: true
  auth:
    username: tofui
    password: tofui          # Change in production
    database: tofui
  primary:
    persistence:
      size: 1Gi

# -- Redis subchart (Bitnami)
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      size: 256Mi

# -- MinIO subchart (Bitnami)
minio:
  enabled: true
  auth:
    rootUser: minioadmin      # Change in production
    rootPassword: minioadmin  # Change in production
  defaultBuckets: tofui
  persistence:
    size: 1Gi

# -- Ingress
ingress:
  enabled: false
  className: nginx
  hosts:
    - host: tofui.local
      paths:
        - path: /
          pathType: Prefix
  # tls:
  #   - secretName: tofui-tls
  #     hosts:
  #       - tofui.example.com

# -- Resource limits
resources:
  server:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  worker:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  web:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
